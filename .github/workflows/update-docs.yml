name: Update docs

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "scripts/**"
      - "sources.yml"
      - ".github/workflows/update-docs.yml"

permissions:
  contents: write
  issues: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        source:
          - claude-code
          - dbt-core
          - bigquery
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: scripts/requirements.txt

      - name: Install deps
        run: pip install -r scripts/requirements.txt

      - name: Restore fetcher cache
        uses: actions/cache@v4
        with:
          path: scripts/.cache/${{ matrix.source }}
          key: src-${{ matrix.source }}-${{ hashFiles('sources.yml') }}
          restore-keys: |
            src-${{ matrix.source }}-

      - name: Fetch ${{ matrix.source }}
        run: python scripts/fetch.py --source ${{ matrix.source }}

      - name: Check size budget
        run: python scripts/check_size_budget.py --source ${{ matrix.source }}

      - name: Upload docs artifact
        uses: actions/upload-artifact@v4
        with:
          name: docs-${{ matrix.source }}
          path: docs/${{ matrix.source }}/
          if-no-files-found: error
          retention-days: 1

  commit:
    needs: fetch
    if: always()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: scripts/requirements.txt

      - name: Install deps
        run: pip install -r scripts/requirements.txt

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Sync artifacts into docs/
        run: |
          mkdir -p docs
          for d in artifacts/docs-*; do
            slug="${d#artifacts/docs-}"
            rm -rf "docs/$slug"
            mv "$d" "docs/$slug"
          done
          rm -rf artifacts

      - name: Build manifest
        run: python scripts/build_manifest.py

      - name: Commit and push
        run: |
          git config user.name "data-live-docs-bot"
          git config user.email "bot@users.noreply.github.com"
          git add -A docs/ MANIFEST.md
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "docs: update $(date -u +%Y-%m-%dT%H:%MZ)"
          git push origin main

      - name: Open issue on fetch failures
        if: contains(needs.fetch.result, 'failure')
        uses: actions/github-script@v7
        with:
          script: |
            const title = `Doc fetch failed at ${new Date().toISOString()}`;
            const body = [
              `One or more matrix legs of update-docs.yml failed.`,
              ``,
              `Run: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              ``,
              `Inspect the failed matrix leg(s) and either:`,
              `- fix the upstream URL/path in \`sources.yml\`, or`,
              `- mark the source as excluded if upstream changed structure.`,
            ].join("\n");
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
              labels: ["fetch-failure"],
            });
